apiVersion: v1
kind: Namespace
metadata:
  name: demo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fastapi-demo-code
  namespace: demo
data:
  app.py: |
    import os
    import time

    from fastapi import FastAPI, Response
    from prometheus_client import CONTENT_TYPE_LATEST, Counter, generate_latest

    app = FastAPI(title="Kubernetes Demo App")
    started_at = time.time()
    requests_total = Counter("demo_app_requests_total", "Total demo app requests", ["path", "pod"])


    def pod_info():
        return {
            "app": "fastapi-demo",
            "pod_name": os.getenv("POD_NAME", "unknown"),
            "pod_namespace": os.getenv("POD_NAMESPACE", "unknown"),
            "pod_ip": os.getenv("POD_IP", "unknown"),
            "node_name": os.getenv("NODE_NAME", "unknown"),
            "uptime_seconds": round(time.time() - started_at, 2),
        }


    @app.get("/")
    def root():
        requests_total.labels(path="/", pod=os.getenv("POD_NAME", "unknown")).inc()
        return pod_info()


    @app.get("/health")
    def health():
        requests_total.labels(path="/health", pod=os.getenv("POD_NAME", "unknown")).inc()
        return {"status": "ok", **pod_info()}


    @app.get("/info")
    def info():
        requests_total.labels(path="/info", pod=os.getenv("POD_NAME", "unknown")).inc()
        return pod_info()


    @app.get("/metrics")
    def metrics():
        requests_total.labels(path="/metrics", pod=os.getenv("POD_NAME", "unknown")).inc()
        return Response(generate_latest(), media_type=CONTENT_TYPE_LATEST)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-demo
  namespace: demo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fastapi-demo
  template:
    metadata:
      labels:
        app: fastapi-demo
    spec:
      containers:
        - name: fastapi-demo
          image: python:3.12-slim
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              pip install --no-cache-dir fastapi uvicorn prometheus-client &&
              uvicorn app:app --host 0.0.0.0 --port 8000 --app-dir /app
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: app-code
              mountPath: /app
              readOnly: true
      volumes:
        - name: app-code
          configMap:
            name: fastapi-demo-code
---
apiVersion: v1
kind: Service
metadata:
  name: fastapi-demo
  namespace: demo
spec:
  type: ClusterIP
  selector:
    app: fastapi-demo
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fastapi-demo
  namespace: demo
spec:
  ingressClassName: nginx
  defaultBackend:
    service:
      name: fastapi-demo
      port:
        number: 80
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fastapi-demo
                port:
                  number: 80
