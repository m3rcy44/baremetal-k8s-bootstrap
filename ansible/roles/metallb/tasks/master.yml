---
- name: Check if Kubernetes control plane is initialized
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: kubernetes_admin_conf

- name: Fail if Kubernetes control plane is not initialized
  ansible.builtin.fail:
    msg: "Kubernetes is not initialized. Run ./scripts/init-cluster.sh first."
  when: not kubernetes_admin_conf.stat.exists

- name: Download MetalLB manifest
  ansible.builtin.get_url:
    url: "{{ metallb_manifest_url }}"
    dest: "{{ metallb_manifest_path }}"
    owner: root
    group: root
    mode: "0644"

- name: Apply MetalLB manifest
  ansible.builtin.command: "kubectl --kubeconfig=/etc/kubernetes/admin.conf apply -f {{ metallb_manifest_path }}"
  register: metallb_apply
  changed_when: "'created' in metallb_apply.stdout"

- name: Wait for MetalLB controller rollout
  ansible.builtin.command: kubectl --kubeconfig=/etc/kubernetes/admin.conf -n metallb-system rollout status deployment/controller --timeout=180s
  changed_when: false

- name: Wait for MetalLB speaker rollout
  ansible.builtin.command: kubectl --kubeconfig=/etc/kubernetes/admin.conf -n metallb-system rollout status daemonset/speaker --timeout=180s
  changed_when: false

- name: Create MetalLB L2 configuration
  ansible.builtin.copy:
    dest: "{{ metallb_config_path }}"
    owner: root
    group: root
    mode: "0644"
    content: |
      apiVersion: metallb.io/v1beta1
      kind: IPAddressPool
      metadata:
        name: default-pool
        namespace: metallb-system
      spec:
        addresses:
          - {{ metallb_address_pool }}
      ---
      apiVersion: metallb.io/v1beta1
      kind: L2Advertisement
      metadata:
        name: default-l2advertisement
        namespace: metallb-system
      spec:
        ipAddressPools:
          - default-pool

- name: Apply MetalLB L2 configuration
  ansible.builtin.command: "kubectl --kubeconfig=/etc/kubernetes/admin.conf apply -f {{ metallb_config_path }}"
  register: metallb_config_apply
  changed_when: "'created' in metallb_config_apply.stdout or 'configured' in metallb_config_apply.stdout"
