---
- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Download Kubernetes apt repository key
  ansible.builtin.get_url:
    url: "https://pkgs.k8s.io/core:/stable:/{{ kubernetes_minor_version }}/deb/Release.key"
    dest: /tmp/kubernetes-apt-release.key
    owner: root
    group: root
    mode: "0644"

- name: Install Kubernetes apt repository keyring
  ansible.builtin.command:
    cmd: "gpg --dearmor -o {{ kubernetes_apt_keyring }} /tmp/kubernetes-apt-release.key"
    creates: "{{ kubernetes_apt_keyring }}"

- name: Configure Kubernetes apt repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/kubernetes.list
    owner: root
    group: root
    mode: "0644"
    content: "{{ kubernetes_apt_source }}\n"
  register: kubernetes_apt_repository

- name: Update apt cache after adding Kubernetes repository
  ansible.builtin.apt:
    update_cache: true
  when: kubernetes_apt_repository.changed

- name: Install Kubernetes packages
  ansible.builtin.apt:
    name: "{{ kubernetes_packages }}"
    state: present
    update_cache: true

- name: Hold Kubernetes package versions
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop: "{{ kubernetes_packages }}"

- name: Enable kubelet service
  ansible.builtin.service:
    name: kubelet
    enabled: true
