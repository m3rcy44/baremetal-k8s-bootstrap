---
- name: Check if Kubernetes control plane is initialized
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: kubernetes_admin_conf

- name: Fail if Kubernetes control plane is not initialized
  ansible.builtin.fail:
    msg: "Kubernetes is not initialized. Run ./scripts/init-cluster.sh first."
  when: not kubernetes_admin_conf.stat.exists

- name: Download Flannel manifest
  ansible.builtin.get_url:
    url: "{{ flannel_manifest_url }}"
    dest: "{{ flannel_manifest_path }}"
    owner: root
    group: root
    mode: "0644"

- name: Configure Flannel to use Lima shared network interface
  ansible.builtin.lineinfile:
    path: "{{ flannel_manifest_path }}"
    insertafter: '^\s+- --kube-subnet-mgr$'
    line: "        - --iface={{ flannel_interface }}"

- name: Apply Flannel manifest
  ansible.builtin.command: "kubectl --kubeconfig=/etc/kubernetes/admin.conf apply -f {{ flannel_manifest_path }}"
  register: flannel_apply
  changed_when: "'created' in flannel_apply.stdout or 'configured' in flannel_apply.stdout"

- name: Wait for Flannel daemonset rollout
  ansible.builtin.command: kubectl --kubeconfig=/etc/kubernetes/admin.conf -n kube-flannel rollout status daemonset/kube-flannel-ds --timeout=180s
  changed_when: false

- name: Wait for all Kubernetes nodes to become Ready
  ansible.builtin.command: kubectl --kubeconfig=/etc/kubernetes/admin.conf wait --for=condition=Ready nodes --all --timeout=180s
  changed_when: false

- name: Wait for CoreDNS rollout
  ansible.builtin.command: kubectl --kubeconfig=/etc/kubernetes/admin.conf -n kube-system rollout status deployment/coredns --timeout=180s
  changed_when: false
